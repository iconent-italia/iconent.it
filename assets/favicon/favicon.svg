<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ICONENT">
  <title>ICONENT</title>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Squircle background — solid #0A0A0A, rounded 22% -->
  <rect x="0" y="0" width="512" height="512" rx="113" ry="113" fill="#0A0A0A"/>
  <!-- Monogramma IC verde brand, font-weight 900, letter-spacing -0.04em -->
  <text
    x="256"
    y="256"
    font-family="Inter, 'SF Pro Display', 'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="335"
    letter-spacing="-13"
    fill="#00FF88"
    text-anchor="middle"
    dominant-baseline="central"
    filter="url(#glow)">IC</text>
</svg>
